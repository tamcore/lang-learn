name: E2E

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy dist for embed
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build server
        run: go build -o bin/server ./cmd/server

      - name: Start server (auto-bootstrap creates admin:admin)
        run: |
          JWT_SECRET=e2e-test-secret-at-least-32-chars DATA_DIR=$(pwd)/data ./bin/server &
          sleep 2

      - name: Test healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          [ "$STATUS" = "200" ] || (echo "healthz failed: $STATUS" && exit 1)
          echo "✓ healthz OK"

      - name: Test bootstrap admin login
        run: |
          RESP=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin","remember_me":true}')
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['data']['user']['is_admin']==True
          assert 'access_token' in d['data']
          assert 'refresh_token' in d['data']
          print('✓ bootstrap admin login OK')
          "

      - name: Test admin creates user via API
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin","remember_me":true}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          # Create a regular user
          RESP=$(curl -s -X POST http://localhost:8080/api/admin/users \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"testpass1"}')
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['data']['username']=='testuser'
          assert d['data']['is_admin']==False
          print('✓ admin created testuser OK')
          "

      - name: Test regular user login
        run: |
          RESP=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"testpass1","remember_me":false}')
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          assert d['data']['user']['is_admin']==False
          assert 'access_token' in d['data']
          assert d['data'].get('refresh_token','')=='', 'remember_me=false should not return refresh_token'
          print('✓ testuser login OK (no refresh_token)')
          "

      - name: Test admin users list
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin","remember_me":true}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          RESP=$(curl -s http://localhost:8080/api/admin/users -H "Authorization: Bearer $TOKEN")
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          users=d['data']
          assert len(users)==2, f'Expected 2 users, got {len(users)}'
          names={u['username'] for u in users}
          assert 'admin' in names and 'testuser' in names
          print(f'✓ {len(users)} users: {names}')
          "

      - name: Test courses list (empty initially)
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin","remember_me":true}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          RESP=$(curl -s http://localhost:8080/api/courses -H "Authorization: Bearer $TOKEN")
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          courses=d['data']
          assert isinstance(courses, list), f'Expected list, got {type(courses)}'
          print(f'✓ courses list OK ({len(courses)} courses)')
          "

      - name: Test SPA fallback
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/some/spa/route)
          [ "$STATUS" = "200" ] || (echo "SPA fallback failed: $STATUS" && exit 1)
          echo "✓ SPA fallback OK"

      - name: Test non-admin cannot create users
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"testuser","password":"testpass1","remember_me":true}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/api/admin/users \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"username":"hacker","password":"nope1234"}')
          [ "$STATUS" = "403" ] || (echo "Expected 403, got $STATUS" && exit 1)
          echo "✓ non-admin blocked from creating users"
