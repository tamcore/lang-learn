name: E2E

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy dist for embed
        run: |
          rm -rf internal/web/dist
          cp -r frontend/dist internal/web/dist

      - name: Build server
        run: go build -o bin/server ./cmd/server

      - name: Build seed
        run: go build -o bin/seed ./cmd/seed

      - name: Seed data
        run: DATA_DIR=$(pwd)/data ./bin/seed

      - name: Start server
        run: |
          JWT_SECRET=e2e-test-secret-at-least-32-chars DATA_DIR=$(pwd)/data ./bin/server &
          sleep 2

      - name: Test healthz
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          [ "$STATUS" = "200" ] || (echo "healthz failed: $STATUS" && exit 1)

      - name: Test login (philipp)
        run: |
          RESP=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"philipp@lang-learn.local","password":"admin123"}')
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['data']['user']['is_admin']==True; print('✓ philipp login OK')"

      - name: Test login (janka)
        run: |
          RESP=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"janka@lang-learn.local","password":"user123"}')
          echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['data']['user']['is_admin']==False; print('✓ janka login OK')"

      - name: Test courses list
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"philipp@lang-learn.local","password":"admin123"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          RESP=$(curl -s http://localhost:8080/api/courses -H "Authorization: Bearer $TOKEN")
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          courses=d['data']
          assert len(courses)==4, f'Expected 4 courses, got {len(courses)}'
          langs={c['source_lang']+'->'+c['target_lang'] for c in courses}
          assert 'sk->en' in langs
          assert 'en->sk' in langs
          assert 'en->de' in langs
          assert 'de->en' in langs
          print(f'✓ {len(courses)} courses found: {langs}')
          "

      - name: Test admin users list
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"philipp@lang-learn.local","password":"admin123"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['access_token'])")
          RESP=$(curl -s http://localhost:8080/api/admin/users -H "Authorization: Bearer $TOKEN")
          echo "$RESP" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          users=d['data']
          assert len(users)==2, f'Expected 2 users, got {len(users)}'
          names={u['username'] for u in users}
          assert 'philipp' in names and 'janka' in names
          print(f'✓ {len(users)} users: {names}')
          "

      - name: Test SPA fallback
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/some/spa/route)
          [ "$STATUS" = "200" ] || (echo "SPA fallback failed: $STATUS" && exit 1)
          echo "✓ SPA fallback OK"
